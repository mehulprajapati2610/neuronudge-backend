server.port=${PORT:8080}

# MongoDB
spring.data.mongodb.uri=${MONGODB_URI}

# JWT
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration=86400000

# Groq AI
groq.api.key=${GROQ_API_KEY}
groq.api.url=https://api.groq.com/openai/v1/chat/completions
groq.model=llama-3.3-70b-versatile

# Email
# Email (Brevo HTTP API - see EmailService.java)
app.email.from=${BREVO_FROM_EMAIL:noreply@neuronudge.com}
app.email.enabled=true

# Burnout alert threshold
app.burnout.alert.threshold=75

# Static files
spring.web.resources.static-locations=classpath:/static/
spring.web.resources.cache.period=0
spring.mvc.static-path-pattern=/**

# Logging
logging.level.com.neuronudge=DEBUG
logging.level.org.springframework.security=WARN

# Google OAuth
google.client.id=${GOOGLE_CLIENT_ID}

# OTP expiry
app.otp.expiry.minutes=10
