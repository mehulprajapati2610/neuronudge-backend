<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NeuroNudge — Create Account</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet"/>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    :root { --bg:#0f1117;--surface:#161b27;--surface2:#1e2535;--border:#2a3347;--accent:#4f8ef7;--teal:#2dd4bf;--text:#e2e8f0;--muted:#8899b4; }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px;}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:20px;width:100%;max-width:500px;padding:48px;position:relative;overflow:hidden;}
    .card::before{content:'';position:absolute;top:-80px;right:-80px;width:220px;height:220px;background:radial-gradient(circle,rgba(79,142,247,0.08) 0%,transparent 70%);pointer-events:none;}
    .logo{display:flex;align-items:center;gap:10px;margin-bottom:32px;}
    .logo-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--accent),var(--teal));border-radius:9px;display:flex;align-items:center;justify-content:center;}
    .logo-text{font-size:1.1rem;font-weight:600;letter-spacing:-0.02em;}
    h1{font-size:1.5rem;font-weight:600;letter-spacing:-0.02em;margin-bottom:6px;}
    .sub{font-size:0.9rem;color:var(--muted);margin-bottom:32px;}
    .sub a{color:var(--accent);text-decoration:none;}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
    .form-group{margin-bottom:18px;}
    label{display:block;font-size:0.78rem;font-weight:500;color:var(--muted);margin-bottom:7px;letter-spacing:0.05em;text-transform:uppercase;}
    input,select{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:11px 14px;font-size:0.92rem;color:var(--text);font-family:'DM Sans',sans-serif;transition:border-color 0.2s,box-shadow 0.2s;outline:none;appearance:none;}
    input:focus,select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(79,142,247,0.12);}
    input::placeholder{color:#4a5568;}
    select option{background:var(--surface2);}
    .role-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:4px;}
    .role-card{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:14px;cursor:pointer;transition:all 0.2s;text-align:center;}
    .role-card:hover{border-color:rgba(79,142,247,0.4);}
    .role-card.active{border-color:var(--accent);background:rgba(79,142,247,0.08);}
    .role-icon{font-size:1.4rem;margin-bottom:6px;}
    .role-label{font-size:0.85rem;font-weight:500;}
    .role-desc{font-size:0.74rem;color:var(--muted);margin-top:2px;}
    .btn{width:100%;background:var(--accent);color:#fff;border:none;border-radius:10px;padding:13px;font-size:0.95rem;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all 0.2s;margin-top:6px;letter-spacing:-0.01em;}
    .btn:hover{background:#3d7ef5;transform:translateY(-1px);box-shadow:0 4px 16px rgba(79,142,247,0.3);}
    .error-msg{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);color:#f87171;border-radius:8px;padding:10px 14px;font-size:0.85rem;margin-bottom:16px;display:none;}
    .success-msg{background:rgba(45,212,191,0.1);border:1px solid rgba(45,212,191,0.3);color:#5eead4;border-radius:8px;padding:10px 14px;font-size:0.85rem;margin-bottom:16px;display:none;}
    .password-strength{height:3px;border-radius:99px;background:var(--border);margin-top:6px;overflow:hidden;}
    .strength-bar{height:100%;border-radius:99px;transition:all 0.3s;width:0;}
    .btn-google{width:100%;background:#fff;color:#1f1f1f;border:1px solid #dadce0;border-radius:10px;padding:12px;font-size:0.95rem;font-weight:500;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:18px;}
    .btn-google:hover{background:#f8f9fa;box-shadow:0 2px 8px rgba(0,0,0,0.15);}
    .divider{display:flex;align-items:center;gap:12px;margin-bottom:18px;}
    .divider span{color:var(--muted);font-size:0.8rem;}
    .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M12 2a10 10 0 1 0 10 10"/><path d="M12 6v6l4 2"/><circle cx="18" cy="6" r="3" fill="rgba(255,255,255,0.3)" stroke="white"/></svg>
      </div>
      <span class="logo-text">NeuroNudge</span>
    </div>
    <h1>Create your account</h1>
    <p class="sub">Already have one? <a href="login.html">Sign in</a></p>
    <div class="error-msg" id="errorMsg"></div>
    <div class="success-msg" id="successMsg"></div>
    <div class="form-row">
      <div class="form-group">
        <label>First name</label>
        <input type="text" id="firstName" placeholder="Alex"/>
      </div>
      <div class="form-group">
        <label>Last name</label>
        <input type="text" id="lastName" placeholder="Johnson"/>
      </div>
    </div>
    <div class="form-group">
      <label>Email address</label>
      <input type="email" id="email" placeholder="you@example.com"/>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Create a strong password" oninput="checkStrength(this.value)"/>
      <div class="password-strength"><div class="strength-bar" id="strengthBar"></div></div>
    </div>
    <div class="form-group">
      <label>I am a</label>
      <div class="role-grid">
        <div class="role-card active" id="roleUser" onclick="selectRole('USER')">
          <div class="role-icon">🧠</div>
          <div class="role-label">User</div>
          <div class="role-desc">Track my wellness</div>
        </div>
        <div class="role-card" id="roleDoctor" onclick="selectRole('DOCTOR')">
          <div class="role-icon">🩺</div>
          <div class="role-label">Doctor</div>
          <div class="role-desc">Support patients</div>
        </div>
      </div>
    </div>
    <button class="btn-google" onclick="triggerGoogleSignup()">
      <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/><path fill="none" d="M0 0h48v48H0z"/></svg>
      Sign up with Google
    </button>
    <div class="divider"><span>or sign up with email</span></div>
    <button class="btn" id="signupBtn" onclick="handleSignup()">Create account</button>
  </div>

  <script>
    let selectedRole = 'USER';
    function selectRole(r){
      selectedRole=r;
      document.getElementById('roleUser').classList.toggle('active',r==='USER');
      document.getElementById('roleDoctor').classList.toggle('active',r==='DOCTOR');
    }
    function checkStrength(pw){
      const bar=document.getElementById('strengthBar');
      let score=0;
      if(pw.length>=8)score++;
      if(/[A-Z]/.test(pw))score++;
      if(/[0-9]/.test(pw))score++;
      if(/[^A-Za-z0-9]/.test(pw))score++;
      const colors=['#ef4444','#f97316','#eab308','#22c55e'];
      bar.style.width=(score*25)+'%';
      bar.style.background=colors[score-1]||'transparent';
    }
    async function handleSignup(){
      const first=document.getElementById('firstName').value.trim();
      const last=document.getElementById('lastName').value.trim();
      const email=document.getElementById('email').value.trim();
      const password=document.getElementById('password').value;
      const err=document.getElementById('errorMsg');
      const succ=document.getElementById('successMsg');
      err.style.display='none'; succ.style.display='none';
      if(!first||!last||!email||!password){showError('Please fill in all fields.');return;}
      if(password.length<6){showError('Password must be at least 6 characters.');return;}
      const btn=document.getElementById('signupBtn');
      btn.textContent='Creating account…'; btn.disabled=true;
      try{
        const res=await fetch('/api/auth/signup',{
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body:JSON.stringify({name:`${first} ${last}`,email,password,role:selectedRole})
        });
        const data=await res.json();
        if(res.ok){
          succ.textContent='Account created! Redirecting…'; succ.style.display='block';
          setTimeout(()=>window.location.href='login.html',1500);
        } else { showError(data.message||'Signup failed.'); }
      } catch(e){ showError('Cannot reach server. Make sure the backend is running on http://localhost:8080'); }
      btn.textContent='Create account'; btn.disabled=false;
    }
    function showError(msg){ const e=document.getElementById('errorMsg'); e.textContent=msg; e.style.display='block'; }
    function triggerGoogleSignup() {
      google.accounts.id.initialize({
        client_id: '1080264095801-h3035vg8ne3tuh163o0lsakr1g0ns00g.apps.googleusercontent.com',
        callback: handleGoogleCredential
      });
      google.accounts.id.prompt();
    }

    async function handleGoogleCredential(response) {
      try {
        const res = await fetch('/api/auth/google', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ credential: response.credential })
        });
        const data = await res.json();
        if (res.ok) {
          sessionStorage.setItem('token',  data.token);
          sessionStorage.setItem('role',   data.role);
          sessionStorage.setItem('name',   data.name);
          sessionStorage.setItem('userId', data.userId);
          window.location.href = 'user-dashboard.html';
        } else {
          showError(data.message || 'Google signup failed.');
        }
      } catch(e) {
        showError('Google signup failed. Please try again.');
      }
    }
  </script>
</body>
</html>
