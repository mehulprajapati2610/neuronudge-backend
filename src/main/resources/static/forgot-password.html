<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NeuroNudge — Reset Password</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root{--bg:#0f1117;--surface:#161b27;--surface2:#1e2535;--border:#2a3347;--accent:#4f8ef7;--text:#e2e8f0;--muted:#8899b4;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:16px;width:100%;max-width:420px;padding:40px;}
    .logo{font-size:1.1rem;font-weight:600;margin-bottom:32px;display:flex;align-items:center;gap:8px;}
    .logo-icon{width:32px;height:32px;background:linear-gradient(135deg,#4f8ef7,#2dd4bf);border-radius:8px;display:flex;align-items:center;justify-content:center;}
    h2{font-size:1.4rem;font-weight:600;margin-bottom:6px;}
    .sub{font-size:0.875rem;color:var(--muted);margin-bottom:28px;}
    .form-group{margin-bottom:18px;}
    label{display:block;font-size:0.75rem;text-transform:uppercase;letter-spacing:0.05em;color:var(--muted);font-weight:500;margin-bottom:6px;}
    input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:9px;padding:11px 14px;font-size:0.9rem;color:var(--text);font-family:'DM Sans',sans-serif;outline:none;transition:border-color 0.2s;}
    input:focus{border-color:var(--accent);}
    .btn{width:100%;background:var(--accent);color:#fff;border:none;border-radius:9px;padding:12px;font-size:0.92rem;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all 0.2s;margin-top:4px;}
    .btn:hover{background:#3d7ef5;}
    .btn:disabled{opacity:0.6;cursor:not-allowed;}
    .msg{border-radius:8px;padding:10px 14px;font-size:0.85rem;margin-bottom:16px;display:none;}
    .msg.error{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);color:#f87171;}
    .msg.success{background:rgba(45,212,191,0.1);border:1px solid rgba(45,212,191,0.3);color:#5eead4;}
    .back{display:block;text-align:center;margin-top:20px;font-size:0.85rem;color:var(--muted);text-decoration:none;}
    .back:hover{color:var(--text);}
    .step{display:none;}
    .step.active{display:block;}
  </style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M12 2a10 10 0 1 0 10 10"/><path d="M12 6v6l4 2"/><circle cx="18" cy="6" r="3" fill="rgba(255,255,255,0.3)" stroke="white"/></svg>
    </div>
    NeuroNudge
  </div>

  <div class="msg error" id="errMsg"></div>
  <div class="msg success" id="okMsg"></div>

  <!-- Step 1: Enter email -->
  <div class="step active" id="step1">
    <h2>Forgot password?</h2>
    <p class="sub">Enter your email and we'll send you a 6-digit OTP.</p>
    <div class="form-group">
      <label>Email address</label>
      <input type="email" id="emailInput" placeholder="you@example.com"/>
    </div>
    <button class="btn" id="sendBtn" onclick="sendOtp()">Send OTP</button>
  </div>

  <!-- Step 2: Enter OTP + new password -->
  <div class="step" id="step2">
    <h2>Enter OTP</h2>
    <p class="sub">Check your email for the 6-digit code. It expires in 10 minutes.</p>
    <div class="form-group">
      <label>OTP Code</label>
      <input type="text" id="otpInput" placeholder="123456" maxlength="6" style="letter-spacing:0.3em;font-size:1.2rem;text-align:center;"/>
    </div>
    <div class="form-group">
      <label>New Password</label>
      <input type="password" id="newPassInput" placeholder="At least 6 characters"/>
    </div>
    <div class="form-group">
      <label>Confirm Password</label>
      <input type="password" id="confirmPassInput" placeholder="Repeat new password"/>
    </div>
    <button class="btn" id="resetBtn" onclick="resetPassword()">Reset Password</button>
  </div>

  <a class="back" href="login.html">← Back to sign in</a>
</div>

<script>
  let userEmail = '';

  async function sendOtp() {
    const email = document.getElementById('emailInput').value.trim();
    if (!email) { showMsg('error', 'Please enter your email.'); return; }
    const btn = document.getElementById('sendBtn');
    btn.textContent = 'Sending…'; btn.disabled = true;
    clearMsgs();
    try {
      await fetch('/api/auth/forgot-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email })
      });
      userEmail = email;
      showMsg('success', 'OTP sent! Check your inbox (and spam folder).');
      setTimeout(() => {
        document.getElementById('step1').classList.remove('active');
        document.getElementById('step2').classList.add('active');
        clearMsgs();
      }, 1500);
    } catch(e) {
      showMsg('error', 'Could not reach server. Try again.');
    }
    btn.textContent = 'Send OTP'; btn.disabled = false;
  }

  async function resetPassword() {
    const otp      = document.getElementById('otpInput').value.trim();
    const newPass  = document.getElementById('newPassInput').value;
    const confirm  = document.getElementById('confirmPassInput').value;
    if (!otp || otp.length !== 6) { showMsg('error', 'Enter the 6-digit OTP.'); return; }
    if (!newPass || newPass.length < 6) { showMsg('error', 'Password must be at least 6 characters.'); return; }
    if (newPass !== confirm) { showMsg('error', 'Passwords do not match.'); return; }
    const btn = document.getElementById('resetBtn');
    btn.textContent = 'Resetting…'; btn.disabled = true;
    clearMsgs();
    try {
      const res = await fetch('/api/auth/reset-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: userEmail, otp, newPassword: newPass })
      });
      const data = await res.json();
      if (res.ok) {
        showMsg('success', '✓ Password reset! Redirecting to login…');
        setTimeout(() => window.location.href = 'login.html', 2000);
      } else {
        showMsg('error', data.message || 'Reset failed.');
        btn.textContent = 'Reset Password'; btn.disabled = false;
      }
    } catch(e) {
      showMsg('error', 'Could not reach server. Try again.');
      btn.textContent = 'Reset Password'; btn.disabled = false;
    }
  }

  function showMsg(type, text) {
    clearMsgs();
    const el = document.getElementById(type === 'error' ? 'errMsg' : 'okMsg');
    el.textContent = text; el.style.display = 'block';
  }
  function clearMsgs() {
    document.getElementById('errMsg').style.display = 'none';
    document.getElementById('okMsg').style.display = 'none';
  }
</script>
</body>
</html>
