<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>NeuroNudge — My Reports</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet"/>
    <script src="navbar.js"></script>
    <script src="api.js"></script>
    <style>
        :root{--bg:#0f1117;--surface:#161b27;--surface2:#1e2535;--border:#2a3347;--accent:#4f8ef7;--teal:#2dd4bf;--text:#e2e8f0;--muted:#8899b4;}
        *{box-sizing:border-box;margin:0;padding:0;}
        body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
        .page{max-width:800px;margin:0 auto;padding:32px 24px;}
        .page-title{font-family:'Instrument Serif',serif;font-size:1.9rem;letter-spacing:-0.02em;margin-bottom:4px;}
        .page-sub{color:var(--muted);font-size:0.9rem;margin-bottom:28px;}
        .report-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;margin-bottom:16px;overflow:hidden;transition:border-color 0.2s;}
        .report-card:hover{border-color:rgba(79,142,247,0.3);}
        .report-header{padding:18px 22px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;}
        .report-doc{font-size:0.95rem;font-weight:600;}
        .report-date{font-size:0.8rem;color:var(--muted);margin-top:2px;}
        .report-body{padding:0 22px 20px;border-top:1px solid var(--border);display:none;}
        .report-body.open{display:block;}
        .section{margin-top:16px;}
        .section-label{font-size:0.72rem;text-transform:uppercase;letter-spacing:0.06em;color:var(--muted);font-weight:500;margin-bottom:6px;}
        .section-value{font-size:0.9rem;line-height:1.6;color:var(--text);}
        .score-row{display:flex;gap:12px;margin-top:16px;}
        .score-pill{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;flex:1;text-align:center;}
        .score-val{font-size:1.4rem;font-weight:700;}
        .score-lbl{font-size:0.72rem;color:var(--muted);margin-top:2px;}
        .sev-badge{display:inline-block;padding:2px 10px;border-radius:99px;font-size:0.75rem;font-weight:600;margin-left:6px;}
        .chevron{transition:transform 0.2s;color:var(--muted);}
        .chevron.open{transform:rotate(180deg);}
        .followup-banner{background:rgba(79,142,247,0.08);border:1px solid rgba(79,142,247,0.2);border-radius:8px;padding:10px 14px;font-size:0.85rem;color:var(--accent);margin-top:14px;}
    </style>
</head>
<body>
<script>requireAuth(); renderNavbar('my-reports');</script>
<div class="page">
    <div class="page-title">My Session Reports</div>
    <div class="page-sub">Reports sent by your doctor after each completed appointment.</div>
    <div id="reportsList"></div>
</div>
<script>
    async function loadReports() {
      const container = document.getElementById('reportsList');
      container.innerHTML = `<div style="padding:20px;">${skeleton(3)}</div>`;
      try {
        const reports = await API.get('/api/reports/my');
        if (!reports || reports.length === 0) {
          container.innerHTML = emptyState('📋', 'No reports yet', 'Reports will appear here after your doctor completes a session report for your appointment.');
          return;
        }
        container.innerHTML = reports.map((r, i) => `
          <div class="report-card">
            <div class="report-header" onclick="toggleReport(${i})">
              <div>
                <div class="report-doc">Dr. ${escHtml(r.doctorName || 'Unknown')}</div>
                <div class="report-date">${r.createdAt ? new Date(r.createdAt).toLocaleDateString('en-US',{weekday:'short',year:'numeric',month:'short',day:'numeric'}) : '—'}</div>
              </div>
              <svg class="chevron" id="chev-${i}" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
            </div>
            <div class="report-body" id="body-${i}">
              <div class="score-row">
                <div class="score-pill">
                  <div class="score-val" style="color:#f97316;">${r.phq9ScoreAtSession ?? '—'}</div>
                  <div class="score-lbl">PHQ-9 Score</div>
                </div>
                <div class="score-pill">
                  <div class="score-val" style="color:#c084fc;">${r.gad7ScoreAtSession ?? '—'}</div>
                  <div class="score-lbl">GAD-7 Score</div>
                </div>
              </div>
              ${r.diagnosisCode ? `
              <div class="section">
                <div class="section-label">Diagnosis Code</div>
                <div class="section-value">${escHtml(r.diagnosisCode)}</div>
              </div>` : ''}
              ${r.clinicalNotes ? `
              <div class="section">
                <div class="section-label">Clinical Notes</div>
                <div class="section-value">${escHtml(r.clinicalNotes)}</div>
              </div>` : ''}
              ${r.medications ? `
              <div class="section">
                <div class="section-label">Medications / Recommendations</div>
                <div class="section-value">${escHtml(r.medications)}</div>
              </div>` : ''}
              ${r.nextSteps ? `
              <div class="section">
                <div class="section-label">Next Steps</div>
                <div class="section-value">${escHtml(r.nextSteps)}</div>
              </div>` : ''}
              ${r.followUpDate ? `
              <div class="followup-banner">
                📅 Suggested follow-up: <strong>${new Date(r.followUpDate + 'T00:00:00').toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'})}</strong>
              </div>` : ''}
            </div>
          </div>`).join('');
      } catch(e) {
        container.innerHTML = emptyState('⚠', 'Could not load reports', e.message);
      }
    }

    function toggleReport(i) {
      const body = document.getElementById('body-' + i);
      const chev = document.getElementById('chev-' + i);
      body.classList.toggle('open');
      chev.classList.toggle('open');
    }

    loadReports();
</script>
</body>
</html>
