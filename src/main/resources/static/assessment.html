<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>NeuroNudge — Mental Health Assessment</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet"/>
    <script src="navbar.js"></script>
    <script src="api.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root{--bg:#0f1117;--surface:#161b27;--surface2:#1e2535;--border:#2a3347;--accent:#4f8ef7;--teal:#2dd4bf;--text:#e2e8f0;--muted:#8899b4;}
        *{box-sizing:border-box;margin:0;padding:0;}
        body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
        .page{max-width:720px;margin:0 auto;padding:32px 24px;}
        .page-title{font-family:'Instrument Serif',serif;font-size:1.9rem;letter-spacing:-0.02em;margin-bottom:6px;}
        .page-sub{color:var(--muted);font-size:0.9rem;margin-bottom:32px;}
        .tabs{display:flex;gap:10px;margin-bottom:28px;}
        .tab{padding:8px 22px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--muted);cursor:pointer;font-size:0.875rem;font-weight:500;transition:all 0.2s;}
        .tab.active{background:var(--accent);border-color:var(--accent);color:#fff;}
        .question-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px 24px;margin-bottom:14px;}
        .q-text{font-size:0.9rem;margin-bottom:14px;line-height:1.5;}
        .options{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
        .opt{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 4px;text-align:center;cursor:pointer;transition:all 0.15s;font-size:0.78rem;color:var(--muted);}
        .opt:hover{border-color:var(--accent);color:var(--text);}
        .opt.selected{background:var(--accent);border-color:var(--accent);color:#fff;}
        .btn-primary{background:var(--accent);color:#fff;border:none;border-radius:9px;padding:12px 28px;font-size:0.9rem;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;margin-top:24px;transition:all 0.2s;}
        .btn-primary:hover{background:#3d7ef5;}
        .btn-primary:disabled{opacity:0.5;cursor:not-allowed;}
        .result-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:32px;text-align:center;display:none;}
        .score-num{font-size:3.5rem;font-weight:700;color:var(--accent);}
        .severity-badge{display:inline-block;padding:6px 18px;border-radius:99px;font-size:0.85rem;font-weight:600;margin:12px 0;}
        .sev-Minimal{background:rgba(45,212,191,0.1);color:#2dd4bf;}
        .sev-Mild{background:rgba(234,179,8,0.1);color:#fbbf24;}
        .sev-Moderate{background:rgba(249,115,22,0.1);color:#fb923c;}
        .sev-Moderately\ Severe{background:rgba(239,68,68,0.1);color:#f87171;}
        .sev-Severe{background:rgba(239,68,68,0.15);color:#ef4444;border:1px solid rgba(239,68,68,0.3);}
        .past-card{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:14px 18px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;}
    </style>
</head>
<body>
<script>requireAuth(); renderNavbar('assessment');</script>
<div class="page">
    <div class="page-title">Mental Health Assessment</div>
    <div class="page-sub">PHQ-9 measures depression. GAD-7 measures anxiety. Results are shared with your doctor.</div>
    <div class="tabs">
        <div class="tab active" onclick="switchTab('PHQ9')">PHQ-9 (Depression)</div>
        <div class="tab" onclick="switchTab('GAD7')">GAD-7 (Anxiety)</div>
        <div class="tab" onclick="switchTab('history')">My History</div>
    </div>
    <div id="formArea"></div>
    <div class="result-card" id="resultCard">
        <div style="font-size:1rem;color:var(--muted);margin-bottom:8px;">Your Score</div>
        <div class="score-num" id="resScore"></div>
        <div id="resSeverity"></div>
        <div style="color:var(--muted);font-size:0.9rem;margin-top:12px;" id="resMsg"></div>
        <button class="btn-primary" onclick="retake()" style="margin-top:20px;">Take Again</button>
    </div>
    <div id="historyArea" style="display:none;"></div>
</div>
<script>
    const PHQ9 = [
      "Little interest or pleasure in doing things",
      "Feeling down, depressed, or hopeless",
      "Trouble falling or staying asleep, or sleeping too much",
      "Feeling tired or having little energy",
      "Poor appetite or overeating",
      "Feeling bad about yourself — or that you are a failure",
      "Trouble concentrating on things",
      "Moving or speaking slowly (or being fidgety/restless)",
      "Thoughts that you would be better off dead or of hurting yourself"
    ];
    const GAD7 = [
      "Feeling nervous, anxious, or on edge",
      "Not being able to stop or control worrying",
      "Worrying too much about different things",
      "Trouble relaxing",
      "Being so restless that it is hard to sit still",
      "Becoming easily annoyed or irritable",
      "Feeling afraid as if something awful might happen"
    ];
    const OPTS = ["Not at all","Several days","More than half the days","Nearly every day"];
    let currentTab = 'PHQ9';
    let answers = [];

    function switchTab(tab) {
      currentTab = tab;
      document.querySelectorAll('.tab').forEach((t,i) => {
        t.classList.toggle('active', ['PHQ9','GAD7','history'][i] === tab);
      });
      document.getElementById('resultCard').style.display = 'none';
      document.getElementById('historyArea').style.display = 'none';
      document.getElementById('formArea').style.display = '';
      if (tab === 'history') { loadHistory(); return; }
      answers = [];
      renderForm(tab === 'PHQ9' ? PHQ9 : GAD7);
    }

    function renderForm(questions) {
      const fa = document.getElementById('formArea');
      fa.innerHTML = questions.map((q,i) => `
        <div class="question-card">
          <div class="q-text"><strong>Q${i+1}.</strong> ${q}</div>
          <div class="options">
            ${OPTS.map((o,j) => `<div class="opt" onclick="pick(${i},${j},this)">(${j}) ${o}</div>`).join('')}
          </div>
        </div>`).join('') +
        `<button class="btn-primary" id="submitBtn" onclick="submitAssessment()" disabled>Submit Assessment</button>`;
      answers = new Array(questions.length).fill(null);
    }

    function pick(qi, val, el) {
      answers[qi] = val;
      el.closest('.options').querySelectorAll('.opt').forEach(o => o.classList.remove('selected'));
      el.classList.add('selected');
      const allAnswered = answers.every(a => a !== null);
      document.getElementById('submitBtn').disabled = !allAnswered;
    }

    async function submitAssessment() {
      const token = sessionStorage.getItem('token');
      const res = await fetch('/api/assessments/submit', {
        method: 'POST',
        headers: {'Content-Type':'application/json','Authorization':'Bearer '+token},
        body: JSON.stringify({type: currentTab, answers})
      });
      const data = await res.json();
      document.getElementById('formArea').style.display = 'none';
      const rc = document.getElementById('resultCard');
      rc.style.display = 'block';
      document.getElementById('resScore').textContent = data.score;
      const sev = data.severity;
      document.getElementById('resSeverity').innerHTML =
        `<span class="severity-badge sev-${sev}">${sev}</span>`;
      const msgs = {
        Minimal: "You're doing well. Keep maintaining healthy habits.",
        Mild: "Mild symptoms detected. Consider journaling and relaxation techniques.",
        Moderate: "Moderate symptoms. Speaking with a professional is recommended.",
        "Moderately Severe": "Please consider booking an appointment with a doctor soon.",
        Severe: "Severe symptoms detected. Please book an appointment as soon as possible."
      };
      document.getElementById('resMsg').textContent = msgs[sev] || '';
    }

    function retake() {
      document.getElementById('resultCard').style.display = 'none';
      document.getElementById('formArea').style.display = '';
      switchTab(currentTab);
    }

    async function loadHistory() {
  document.getElementById('formArea').style.display = 'none';
  const ha = document.getElementById('historyArea');
  ha.style.display = 'block';
  const token = sessionStorage.getItem('token');
  const res = await fetch('/api/assessments/my', {headers:{'Authorization':'Bearer '+token}});
  const data = await res.json();
  if (!data.length) { ha.innerHTML = '<p style="color:var(--muted);">No assessments taken yet.</p>'; return; }

  const phq9 = data.filter(a => a.type === 'PHQ9').reverse();
  const gad7 = data.filter(a => a.type === 'GAD7').reverse();

  ha.innerHTML = `
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:20px;">
      <div style="font-size:0.9rem;font-weight:600;margin-bottom:4px;">PHQ-9 Score Trend</div>
      <div style="font-size:0.78rem;color:var(--muted);margin-bottom:14px;">Depression screening over time</div>
      ${phq9.length < 2 ? '<p style="color:var(--muted);font-size:0.85rem;">Take at least 2 assessments to see a trend.</p>' : '<canvas id="phqChart" height="100"></canvas>'}
    </div>
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:24px;">
      <div style="font-size:0.9rem;font-weight:600;margin-bottom:4px;">GAD-7 Score Trend</div>
      <div style="font-size:0.78rem;color:var(--muted);margin-bottom:14px;">Anxiety screening over time</div>
      ${gad7.length < 2 ? '<p style="color:var(--muted);font-size:0.85rem;">Take at least 2 assessments to see a trend.</p>' : '<canvas id="gadChart" height="100"></canvas>'}
    </div>
    <div style="font-size:0.85rem;font-weight:600;color:var(--muted);margin-bottom:10px;text-transform:uppercase;letter-spacing:0.05em;">All Entries</div>
    ${data.map(a => `
    <div class="past-card">
      <div>
        <div style="font-weight:600;font-size:0.9rem;">${a.type} — Score: ${a.totalScore}</div>
        <div style="font-size:0.8rem;color:var(--muted);">${new Date(a.completedAt).toLocaleDateString()}</div>
      </div>
      <span class="severity-badge sev-${a.severity}" style="font-size:0.78rem;">${a.severity}</span>
    </div>`).join('')}`;

  const chartOpts = (label, color, maxScore) => ({
    type: 'line',
    options: {
      responsive: true, maintainAspectRatio: true,
      plugins: { legend: { display: false } },
      scales: {
        x: { grid: { color: 'rgba(42,51,71,0.5)' }, ticks: { color: '#8899b4', font: { family: 'DM Sans', size: 10 } } },
        y: { grid: { color: 'rgba(42,51,71,0.5)' }, ticks: { color: '#8899b4', font: { family: 'DM Sans', size: 10 } }, min: 0, max: maxScore }
      }
    },
    data: {
      labels: [],
      datasets: [{ label, data: [], borderColor: color, backgroundColor: color.replace(')', ',0.08)').replace('rgb', 'rgba'), fill: true, tension: 0.4, pointRadius: 4, borderWidth: 2 }]
    }
  });

  if (phq9.length >= 2) {
    const cfg = chartOpts('PHQ-9', 'rgb(249,115,22)', 27);
    cfg.data.labels = phq9.map(a => new Date(a.completedAt).toLocaleDateString('en-US', {month:'short',day:'numeric'}));
    cfg.data.datasets[0].data = phq9.map(a => a.totalScore);
    new Chart(document.getElementById('phqChart').getContext('2d'), cfg);
  }
  if (gad7.length >= 2) {
    const cfg = chartOpts('GAD-7', 'rgb(192,132,252)', 21);
    cfg.data.labels = gad7.map(a => new Date(a.completedAt).toLocaleDateString('en-US', {month:'short',day:'numeric'}));
    cfg.data.datasets[0].data = gad7.map(a => a.totalScore);
    new Chart(document.getElementById('gadChart').getContext('2d'), cfg);
  }
}

    switchTab('PHQ9');
</script>
</body>
</html>
